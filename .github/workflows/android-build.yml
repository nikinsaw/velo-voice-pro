name: Remote Expo Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './package.json'

      - name: Install JavaScript Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI Globally
        run: npm install -g expo-cli

      - name: Run Expo Prebuild (Generates Android Directory)
        run: npx expo prebuild --platform android

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Generated Gradle Executable
        run: cd android && chmod +x ./gradlew

      - name: Build Android Unsigned Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
